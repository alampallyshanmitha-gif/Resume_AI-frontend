<!DOCTYPE html>
<html>
<head>
<title>Story Generator - CareerForge AI</title>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav a {
    color:white;
    margin-left:15px;
    text-decoration:none;
}

.container {
    max-width:900px;
    margin:40px auto;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#0f172a;
    color:white;
    border:none;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
}

.result {
    margin-top:20px;
    padding:15px;
    background:black;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="storytelling.html">Story</a>
</div>
</nav>

<div class="container">

<h2>AI Story Generator 📖</h2>

<div class="card">

<input type="text" id="topic" placeholder="Enter topic">

<select id="type">
<option value="funny">Funny</option>
<option value="motivational">Motivational</option>
<option value="horror">Horror</option>
</select>

<button onclick="generateStory()">Generate</button>

<div class="result" id="output"></div>

</div>

</div>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";

async function generateStory(){
    const topic = document.getElementById("topic").value.trim();
    const type = document.getElementById("type").value;
    const output = document.getElementById("output");

    if(!topic){
        alert("Enter topic");
        return;
    }

    output.innerText = "Generating...";

    try {
        const res = await fetch(BASE + "/api/story", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ topic, type })
        });

        const data = await res.json();

        output.innerText = data.story || "No story generated";

    } catch (err) {
        output.innerText = "❌ Backend error";
    }
}
</script>

</body>
</html>
