<!DOCTYPE html>
<html>
<head>
<title>Story Generator - CareerForge AI</title>
<base href ="/Resume-Builder-AI/">
<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 {
    color: var(--primary);
}

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.container {
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:none;
    background:#0f172a;
    color:white;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
    cursor:pointer;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.result {
    margin-top:20px;
    padding:15px;
    background:black;
    border-radius:5px;
    white-space: pre-wrap;
}

footer {
    text-align:center;
    padding:20px;
    margin-top:40px;
    color: var(--text-muted);
}
</style>

</head>

<body>

<nav>
    <h2>CareerForge AI</h2>
    <div>
<a href="/ Resume-Builder-AI/index.html">Home</a>
        <a href="/ Resume-Builder-AI/resume.html">Resume</a>
        <a href="/ Resume-Builder-AI/ats.html">ATS</a>
        <a href="/ Resume-Builder-AI/portfolio.html">Portfolio</a>
        <a href="/ Resume-Builder-AI/interview.html">Interview</a>
        <a href="/ Resume-Builder-AI/jobs.html">Jobs</a>
        <a href="/ Resume-Builder-AI/ai-tools.html">AI Tools</a>
        <a href="/ Resume-Builder-AI/storytelling.html">Story</a>
        <a href="/ Resume-Builder-AI/login.html">Login</a>
    </div>
</nav>

<div class="container">

<h2>AI Story Generator 📖</h2>

<div class="card">

<input type="text" id="topic" placeholder="Enter story topic (e.g., space adventure)" required>

<select id="type">
    <option value="funny">Funny</option>
    <option value="motivational">Motivational</option>
    <option value="horror">Horror</option>
</select>

<button id="generateBtn" onclick="generateStory()">Generate Story</button>

<div class="result" id="output"></div>

</div>

</div>

<footer>
    © 2026 CareerForge AI
</footer>

<script>
async function generateStory(){
    const topic = document.getElementById("topic").value.trim();
    const type = document.getElementById("type").value;
    const btn = document.getElementById("generateBtn");
    const output = document.getElementById("output");

    if(!topic){
        alert("Enter a topic!");
        return;
    }

    btn.disabled = true;
    output.innerText = "Generating story...";

    try {
        const response = await fetch("https://resume-builder-ai-1.onrender.com/api/story", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic, type })
        });

        const result = await response.json();
        output.innerText = result.story || "No story generated.";
    } catch (err) {
        output.innerText = "Error connecting to backend: " + err;
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
