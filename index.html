<!DOCTYPE html>
<html>
<head>
<title>CareerForge AI</title>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 { color: var(--primary); }

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.container {
    max-width:1100px;
    margin:40px auto;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

pre {
    background:#0f172a;
    padding:15px;
    margin-top:30px;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="resume.html">Resume</a>
<a href="ats.html">ATS</a>
<a href="portfolio.html">Portfolio</a>
<a href="interview.html">Interview</a>
<a href="jobs.html">Jobs</a>
<a href="ai-tools.html">AI Tools</a>
<a href="storytelling.html">Story</a>
<a href="login.html">Login</a>
</div>
</nav>

<div class="container">

<h1 style="text-align:center;">CareerForge AI 🚀</h1>

<div class="grid">
<div class="card" onclick="go('resume.html')">Resume</div>
<div class="card" onclick="go('ats.html')">ATS</div>
<div class="card" onclick="go('portfolio.html')">Portfolio</div>
<div class="card" onclick="go('interview.html')">Interview</div>
<div class="card" onclick="go('jobs.html')">Jobs</div>
<div class="card" onclick="go('ai-tools.html')">AI Tools</div>
<div class="card" onclick="go('storytelling.html')">Story</div>
<div class="card" onclick="go('login.html')">Login</div>
</div>

<pre id="output">Checking backend connection...</pre>

</div>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";

function go(page){
    window.location.href = page;
}

// ✅ SIMPLE BACKEND CHECK
async function checkBackend() {
    const el = document.getElementById("output");

    try {
        const res = await fetch(BASE + "/api/resume"); // GET request
        const data = await res.json();

        el.textContent = "✅ Backend Connected:\n" + JSON.stringify(data,null,2);

    } catch (err) {
        el.textContent = "❌ Backend Error:\n" + err;
    }
}

window.onload = checkBackend;
</script>

</body>
</html>
