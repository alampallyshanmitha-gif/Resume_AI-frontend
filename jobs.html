<!DOCTYPE html>
<html>
<head>
<title>Jobs - CareerForge AI</title>
<base href ="/Resume-Builder-AI/">
<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 {
    color: var(--primary);
}

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.container {
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
}

h2 {
    text-align:center;
    margin-bottom:20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background:#2a3a55;
}

.card h3 {
    color: var(--primary);
}

.type {
    margin-top:10px;
    font-weight:bold;
}

.intern {
    color: #22c55e;
}

.job {
    color: #facc15;
}

button {
    margin-top:10px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

button:hover {
    background:#4f46e5;
}

footer {
    text-align:center;
    padding:20px;
    margin-top:40px;
    color: var(--text-muted);
}
</style>

</head>

<body>

<nav>
    <h2>CareerForge AI</h2>
    <div>
        <a href="/ Resume-Builder-AI/index.html">Home</a>
        <a href="/ Resume-Builder-AI/resume.html">Resume</a>
        <a href="/ Resume-Builder-AI/ats.html">ATS</a>
        <a href="/ Resume-Builder-AI/portfolio.html">Portfolio</a>
        <a href="/ Resume-Builder-AI/interview.html">Interview</a>
        <a href="/ Resume-Builder-AI/jobs.html">Jobs</a>
        <a href="/ Resume-Builder-AI/ai-tools.html">AI Tools</a>
        <a href="/ Resume-Builder-AI/storytelling.html">Story</a>
        <a href="/ Resume-Builder-AI/login.html">Login</a>
</nav>

<div class="container">

<h2>💼 Jobs & Internships</h2>

<div class="grid" id="jobsList">
    Loading jobs...
</div>

</div>

<footer>
    © 2026 CareerForge AI
</footer>

<script>
async function loadJobs() {
    const jobsList = document.getElementById("jobsList");
    jobsList.innerHTML = "Loading jobs...";

    try {
        // Correct API endpoint for jobs
        const res = await fetch("https://resume-builder-ai-1.onrender.com/api/jobs");
        if(!res.ok) throw new Error("Failed to fetch jobs from backend");

        const data = await res.json();

        let html = "";
        data.jobs.forEach(job => {
            html += `
                <div class="card">
                    <h3>${job.title}</h3>
                    <p>${job.company}</p>
                    <p>${job.location}</p>
                    <p class="type ${job.type === 'Internship' ? 'intern' : 'job'}">
                        ${job.type}
                    </p>
                    <a href="${job.applyLink}" target="_blank">
                        <button>Apply Now 🚀</button>
                    </a>
                </div>
            `;
        });

        jobsList.innerHTML = html;

    } catch(err) {
        jobsList.innerHTML = "<p style='color:red'>❌ Error connecting to backend. Make sure server is running.</p>";
        console.error(err);
    }
}

// Load jobs when page loads
window.onload = loadJobs;
</script>

</body>
</html>
