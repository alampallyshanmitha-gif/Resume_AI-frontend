<!DOCTYPE html>
<html>
<head>
<title>Jobs - CareerForge AI</title>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 { color: var(--primary); }

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.container {
    max-width:1100px;
    margin:40px auto;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
}

.type { margin-top:10px; font-weight:bold; }
.intern { color: #22c55e; }
.job { color: #facc15; }

button {
    margin-top:10px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="resume.html">Resume</a>
<a href="ats.html">ATS</a>
<a href="portfolio.html">Portfolio</a>
<a href="interview.html">Interview</a>
<a href="jobs.html">Jobs</a>
<a href="ai-tools.html">AI Tools</a>
<a href="storytelling.html">Story</a>
<a href="login.html">Login</a>
</div>
</nav>

<div class="container">

<h2>💼 Jobs & Internships</h2>

<div class="grid" id="jobsList">
Loading jobs...
</div>

</div>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";

async function loadJobs() {
    const jobsList = document.getElementById("jobsList");

    try {
        const res = await fetch(BASE + "/api/jobs");
        const data = await res.json();

        if(!data.jobs || data.jobs.length === 0){
            jobsList.innerHTML = "<p>No jobs available yet.</p>";
            return;
        }

        let html = "";
        data.jobs.forEach(job => {
            html += `
            <div class="card">
                <h3>${job.title}</h3>
                <p>${job.company}</p>
                <p>${job.location}</p>
                <p class="type ${job.type === 'Internship' ? 'intern' : 'job'}">${job.type}</p>
                <a href="${job.applyLink}" target="_blank">
                    <button>Apply Now 🚀</button>
                </a>
            </div>`;
        });

        jobsList.innerHTML = html;

    } catch (err) {
        jobsList.innerHTML = "<p style='color:red'>❌ Failed to load jobs</p>";
    }
}

window.onload = loadJobs;
</script>

</body>
</html>
