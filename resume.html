<!DOCTYPE html>
<html>
<head>
<title>Resume Builder - CareerForge AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav a {
    color:white;
    margin-left:15px;
    text-decoration:none;
}

.container {
    max-width:900px;
    margin:40px auto;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#0f172a;
    color:white;
    border:none;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
}

.resume-preview {
    margin-top:20px;
    padding:20px;
    background:white;
    color:black;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="resume.html">Resume</a>
<a href="portfolio.html">Portfolio</a>
</div>
</nav>

<div class="container">

<h2>Resume Builder 📄</h2>

<div class="card">

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone">
<textarea id="education" placeholder="Education"></textarea>
<textarea id="skills" placeholder="Skills (comma separated)"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>

<button onclick="generateResume()">Generate Resume</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="resume" class="resume-preview"></div>

</div>

</div>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";

async function generateResume(){
    const data = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        education: document.getElementById("education").value.trim(),
        skills: document.getElementById("skills").value
            .split(",")
            .map(s=>s.trim())
            .filter(s=>s),
        experience: document.getElementById("experience").value.trim()
    };

    if(!data.name || !data.email){
        alert("Fill name & email");
        return;
    }

    try {
        const res = await fetch(BASE + "/api/resume", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if(!result.resume){
            document.getElementById("resume").innerText = "Error generating resume";
            return;
        }

        const r = result.resume;

        document.getElementById("resume").innerHTML = `
            <h2>${r.name}</h2>
            <p>${r.email}${r.phone ? " | " + r.phone : ""}</p>

            <h3>Education</h3>
            <p>${r.education || "-"}</p>

            <h3>Skills</h3>
            <p>${(r.skills || []).join(", ")}</p>

            <h3>Experience</h3>
            <p>${r.experience || "-"}</p>

            <p><small>Created: ${new Date(r.createdAt).toLocaleString()}</small></p>
        `;

    } catch(err) {
        document.getElementById("resume").innerText = "❌ Backend error";
    }
}

function downloadPDF(){
    const el = document.getElementById("resume");

    if(!el.innerHTML){
        alert("Generate resume first!");
        return;
    }

    html2pdf().from(el).save("resume.pdf");
}
</script>

</body>
</html>
