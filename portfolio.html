<!DOCTYPE html>
<html>
<head>
<title>Portfolio Builder - CareerForge AI</title>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav a {
    color:white;
    margin-left:15px;
    text-decoration:none;
}

.container {
    max-width:900px;
    margin:40px auto;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#0f172a;
    color:white;
    border:none;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
}

.result {
    margin-top:20px;
    padding:20px;
    background:#1e293b;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="resume.html">Resume</a>
<a href="portfolio.html">Portfolio</a>
</div>
</nav>

<div class="container">

<h2>Portfolio Builder 🌐</h2>

<div class="card">

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="role" placeholder="Your Role">

<textarea id="skills" placeholder="Skills (comma separated)"></textarea>
<textarea id="projects" placeholder="Projects / Experience"></textarea>

<button onclick="generatePortfolio()">Generate</button>

<div class="result" id="output"></div>

</div>

</div>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";

async function generatePortfolio(){
    const name = document.getElementById("name").value.trim();
    const role = document.getElementById("role").value.trim();
    const skills = document.getElementById("skills").value
        .split(",")
        .map(s => s.trim())
        .filter(s => s);

    const projects = document.getElementById("projects").value.trim();

    if(!name || !role){
        alert("Fill name & role");
        return;
    }

    try {
        const res = await fetch(BASE + "/api/portfolio", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ name, role, skills, projects })
        });

        const data = await res.json();

        if(!data.portfolio){
            document.getElementById("output").innerText = "Error generating portfolio";
            return;
        }

        const p = data.portfolio;

        document.getElementById("output").innerHTML = `
            <h2>${p.name}</h2>
            <p><b>${p.role}</b></p>

            <h3>Skills</h3>
            <p>${(p.skills || []).join(", ")}</p>

            <h3>Projects</h3>
            <p>${p.projects || "No projects"}</p>
        `;

    } catch (err) {
        document.getElementById("output").innerText = "❌ Backend error";
    }
}
</script>

</body>
</html>
