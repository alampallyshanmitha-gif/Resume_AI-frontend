<!DOCTYPE html>
<html>
<head>
<title>Portfolio Builder - CareerForge AI</title>
<base href ="/Resume-Builder-AI/">
<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 {
    color: var(--primary);
}

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

nav a:hover {
    color: var(--primary);
}

.container {
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
}

h2 {
    text-align:center;
    color: var(--primary);
    margin-bottom:20px;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:none;
    background:#0f172a;
    color:white;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
    cursor:pointer;
    font-weight:500;
    border-radius:5px;
    transition:0.3s;
}

button:hover {
    background:#4f46e5;
}

.result {
    margin-top:20px;
    padding:20px;
    background:#1e293b;
    border-radius:5px;
    white-space: pre-wrap;
}

.result h2, .result h3 {
    color: var(--primary);
}

.result p {
    color: var(--text-main);
}

footer {
    text-align:center;
    padding:20px;
    margin-top:40px;
    color: var(--text-muted);
}
</style>

</head>
<body>

<nav>
    <h2>CareerForge AI</h2>
<a href="/ Resume-Builder-AI/index.html">Home</a>
        <a href="/ Resume-Builder-AI/resume.html">Resume</a>
        <a href="/ Resume-Builder-AI/ats.html">ATS</a>
        <a href="/ Resume-Builder-AI/portfolio.html">Portfolio</a>
        <a href="/ Resume-Builder-AI/interview.html">Interview</a>
        <a href="/ Resume-Builder-AI/jobs.html">Jobs</a>
        <a href="/ Resume-Builder-AI/ai-tools.html">AI Tools</a>
        <a href="/ Resume-Builder-AI/storytelling.html">Story</a>
        <a href="/ Resume-Builder-AI/login.html">Login</a>
    </div>
</nav>

<div class="container">

<h2>Portfolio Builder 🌐</h2>

<div class="card">

<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="role" placeholder="Your Role (e.g., Java Developer)" required>
<textarea id="skills" placeholder="Your Skills (comma separated)"></textarea>
<textarea id="projects" placeholder="Your Projects / Experience"></textarea>

<button onclick="generatePortfolio()">Generate Portfolio</button>

<div class="result" id="output"></div>

</div>

</div>

<footer>
    © 2026 CareerForge AI
</footer>

<script>
async function generatePortfolio(){
    const name = document.getElementById("name").value.trim();
    const role = document.getElementById("role").value.trim();
    const skills = document.getElementById("skills").value.split(",").map(s=>s.trim()).filter(s=>s);
    const projects = document.getElementById("projects").value.trim();

    if(!name || !role){
        alert("Please fill in Name and Role!");
        return;
    }

    try {
        const response = await fetch("https://resume-builder-ai-1.onrender.com/api/portfolio", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, role, skills, projects })
        });

        const result = await response.json();

        if(result.error){
            document.getElementById("output").innerText = "Error: " + result.error;
            return;
        }

        // Display generated portfolio
        const portfolio = result.portfolio;
        document.getElementById("output").innerHTML = `
            <h2>${portfolio.name}</h2>
            <p><b>${portfolio.role}</b></p>

            <h3>Skills</h3>
            <p>${portfolio.skills.join(", ")}</p>

            <h3>Projects / Experience</h3>
            <p>${portfolio.projects}</p>
        `;
    } catch (err) {
        document.getElementById("output").innerText = "Error connecting to backend: " + err;
    }
}
</script>

</body>
</html>
