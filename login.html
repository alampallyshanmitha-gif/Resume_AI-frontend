<!DOCTYPE html>
<html>
<head>
<title>Login - CareerForge AI</title>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

.container {
    max-width:400px;
    margin:60px auto;
}

.card {
    background: var(--bg-card);
    padding:25px;
    border-radius:10px;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#0f172a;
    color:white;
    border:none;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
}

.result {
    margin-top:10px;
    padding:10px;
    background:black;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
</div>
</nav>

<div class="container">
<div class="card">

<h2 id="title">Login</h2>

<input type="text" id="name" placeholder="Name (only for signup)" style="display:none;">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="handleAuth()">Login</button>

<p onclick="toggleMode()" style="cursor:pointer; margin-top:10px;">
Switch to Signup
</p>

<div class="result" id="result"></div>

</div>
</div>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";

let isLogin = true;

function toggleMode(){
    isLogin = !isLogin;

    document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
    document.querySelector("button").innerText = isLogin ? "Login" : "Sign Up";

    // show name field only in signup
    document.getElementById("name").style.display = isLogin ? "none" : "block";
}

async function handleAuth(){
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!email || !password || (!isLogin && !name)){
        document.getElementById("result").innerText = "Fill all fields!";
        return;
    }

    const url = BASE + (isLogin ? "/api/login" : "/api/signup");

    const body = isLogin
        ? { email, password }
        : { name, email, password };

    try {
        const res = await fetch(url, {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if(data.success){
            localStorage.setItem("user", JSON.stringify(data.user));
            window.location.href = "index.html";
        } else {
            document.getElementById("result").innerText = data.message;
        }

    } catch (err) {
        document.getElementById("result").innerText = "❌ Error connecting to backend";
    }
}
</script>

</body>
</html>
