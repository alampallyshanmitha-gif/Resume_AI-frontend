<!DOCTYPE html>
<html>
<head>
<title>AI Tools - CareerForge AI</title>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 { color: var(--primary); }

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.container {
    max-width:1100px;
    margin:40px auto;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
    text-align:center;
}

button {
    margin-top:10px;
    padding:8px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
    cursor:pointer;
}

footer {
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="resume.html">Resume</a>
<a href="ats.html">ATS</a>
<a href="portfolio.html">Portfolio</a>
<a href="interview.html">Interview</a>
<a href="jobs.html">Jobs</a>
<a href="ai-tools.html">AI Tools</a>
<a href="storytelling.html">Story</a>
<a href="login.html">Login</a>
</div>
</nav>

<div class="container">
<h2>Top AI Tools 🌐</h2>
<div class="grid" id="aiGrid">
<p>Loading AI tools...</p>
</div>
</div>

<footer>© 2026 CareerForge AI</footer>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";
const aiGrid = document.getElementById("aiGrid");

async function loadAITools() {
    try {
        const res = await fetch(BASE + "/api/aitools");
        const data = await res.json();

        aiGrid.innerHTML = "";

        if (!data.tools || data.tools.length === 0) {
            aiGrid.innerHTML = "<p>No AI tools available yet.</p>";
            return;
        }

        data.tools.forEach(tool => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <h3>${tool.name}</h3>
                <p>${tool.description}</p>
                <button onclick="window.open('${tool.url}', '_blank')">Open</button>
            `;

            aiGrid.appendChild(card);
        });

    } catch (err) {
        aiGrid.innerHTML = "<p style='color:red'>Failed to load AI tools ❌</p>";
        console.error(err);
    }
}

window.onload = loadAITools;
</script>

</body>
</html>
