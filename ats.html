<!DOCTYPE html>
<html>
<head>
<title>ATS Checker - CareerForge AI</title>
<base href ="/Resume-Builder-AI/">
<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 {
    color: var(--primary);
}

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.container {
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
}

textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:none;
    background:#0f172a;
    color:white;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.result {
    margin-top:20px;
    padding:15px;
    background:black;
    border-radius:5px;
    white-space: pre-wrap;
}

footer {
    text-align:center;
    padding:20px;
    margin-top:40px;
    color: var(--text-muted);
}
</style>

</head>

<body>

<nav>
    <h2>CareerForge AI</h2>
    <div>
        <a href="/ Resume-Builder-AI/index.html">Home</a>
        <a href="/ Resume-Builder-AI/resume.html">Resume</a>
        <a href="/ Resume-Builder-AI/ats.html">ATS</a>
        <a href="/ Resume-Builder-AI/portfolio.html">Portfolio</a>
        <a href="/ Resume-Builder-AI/interview.html">Interview</a>
        <a href="/ Resume-Builder-AI/jobs.html">Jobs</a>
        <a href="/ Resume-Builder-AI/ai-tools.html">AI Tools</a>
        <a href="/ Resume-Builder-AI/storytelling.html">Story</a>
        <a href="/ Resume-Builder-AI/login.html">Login</a>
    </div>
</nav>

<div class="container">

<h2>ATS Resume Checker 📄</h2>

<div class="card">

<form id="atsForm">

<label>Paste Your Resume</label>
<textarea id="resume" rows="6" placeholder="Paste your resume here..."></textarea>

<label>Paste Job Description</label>
<textarea id="job" rows="6" placeholder="Paste job description here..."></textarea>

<button type="submit">Check ATS Score</button>

</form>

<div class="result" id="result">Waiting for input...</div>

</div>

</div>

<footer>
    © 2026 CareerForge AI
</footer>

<script>
document.getElementById('atsForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const resume = document.getElementById('resume').value.trim();
    const job = document.getElementById('job').value.trim();

    if(!resume || !job){
        document.getElementById('result').innerText = "Please fill both fields!";
        return;
    }

    try {
        const response = await fetch("https://resume-builder-ai-1.onrender.com/api/ats/check", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ resume, job })
        });

        if(!response.ok){
            throw new Error("Backend returned error: " + response.status);
        }

        const data = await response.json();

        if(data.error){
            document.getElementById('result').innerText = data.error;
        } else {
            document.getElementById('result').innerText =
                "ATS Score: " + data.score + "%\n\n" + data.feedback;
        }
    } catch (err) {
        document.getElementById('result').innerText = "Error connecting to backend: " + err;
    }
});
</script>
</body>
</html>
