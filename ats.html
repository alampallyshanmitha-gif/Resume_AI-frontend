<!DOCTYPE html>
<html>
<head>
<title>ATS Checker - CareerForge AI</title>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 { color: var(--primary); }

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.container {
    max-width:900px;
    margin:40px auto;
}

.card {
    background: var(--bg-card);
    padding:20px;
    border-radius:10px;
}

textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    background:#0f172a;
    color:white;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
    cursor:pointer;
}

.result {
    margin-top:20px;
    padding:15px;
    background:black;
    border-radius:5px;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="resume.html">Resume</a>
<a href="ats.html">ATS</a>
<a href="portfolio.html">Portfolio</a>
<a href="interview.html">Interview</a>
<a href="jobs.html">Jobs</a>
<a href="ai-tools.html">AI Tools</a>
<a href="storytelling.html">Story</a>
<a href="login.html">Login</a>
</div>
</nav>

<div class="container">

<h2>ATS Resume Checker 📄</h2>

<div class="card">

<form id="atsForm">

<label>Paste Your Resume</label>
<textarea id="resume" rows="6"></textarea>

<label>Paste Job Description</label>
<textarea id="job" rows="6"></textarea>

<button type="submit">Check ATS Score</button>

</form>

<div class="result" id="result">Waiting for input...</div>

</div>
</div>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";

document.getElementById('atsForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const resume = document.getElementById('resume').value.trim();
    const job = document.getElementById('job').value.trim();

    if(!resume || !job){
        document.getElementById('result').innerText = "Please fill both fields!";
        return;
    }

    try {
        const res = await fetch(BASE + "/api/ats", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                resumeText: resume,
                jobDescription: job
            })
        });

        const data = await res.json();

        if(!res.ok){
            throw new Error(data.error || "Server error");
        }

        document.getElementById('result').innerText =
            "ATS Score: " + data.score + "%\n\n" + data.feedback;

    } catch (err) {
        document.getElementById('result').innerText =
            "❌ Error: " + err.message;
    }
});
</script>

</body>
</html>
