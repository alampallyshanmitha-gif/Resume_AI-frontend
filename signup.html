<!DOCTYPE html>
<html>
<head>
<title>Sign Up - CareerForge AI</title>
<base href ="/Resume-Builder-AI/">
<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

nav h2 {
    color: var(--primary);
}

nav a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.container {
    max-width:400px;
    margin:60px auto;
}

.card {
    background: var(--bg-card);
    padding:25px;
    border-radius:10px;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:none;
    background:#0f172a;
    color:white;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
    cursor:pointer;
    font-weight:500;
    border-radius:5px;
    transition:0.3s;
}

button:hover {
    background:#4f46e5;
}

.link {
    margin-top:15px;
    text-align:center;
    color: var(--text-muted);
}

.link a {
    color: var(--primary);
    text-decoration:none;
}

.result {
    margin-top:15px;
    padding:10px;
    background:black;
    border-radius:5px;
    white-space: pre-wrap;
}

footer {
    text-align:center;
    padding:20px;
    margin-top:40px;
    color: var(--text-muted);
}
</style>

</head>

<body>

<nav>
    <h2>CareerForge AI</h2>
    <div>
   <a href="/ Resume-Builder-AI/index.html">Home</a>
        <a href="/ Resume-Builder-AI/resume.html">Resume</a>
        <a href="/ Resume-Builder-AI/ats.html">ATS</a>
        <a href="/ Resume-Builder-AI/portfolio.html">Portfolio</a>
        <a href="/ Resume-Builder-AI/interview.html">Interview</a>
        <a href="/ Resume-Builder-AI/jobs.html">Jobs</a>
        <a href="/ Resume-Builder-AI/ai-tools.html">AI Tools</a>
        <a href="/ Resume-Builder-AI/storytelling.html">Story</a>
        <a href="/ Resume-Builder-AI/login.html">Login</a>
    </div>
</nav>

<div class="container">

<div class="card">

<h2>Create Account 🎉</h2>

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<input type="password" id="confirm" placeholder="Confirm Password" required>

<button onclick="signup()">Sign Up</button>

<div class="link">
    Already have an account? <a href="login.html">Login</a>
</div>

<div class="result" id="result"></div>

</div>

</div>

<footer>
    © 2026 CareerForge AI
</footer>

<script>
async function signup(){
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if(!name || !email || !password || !confirm){
        document.getElementById("result").innerText = "Please fill all fields!";
        return;
    }

    if(password !== confirm){
        document.getElementById("result").innerText = "Passwords do not match!";
        return;
    }

    try {
        // Use your Render backend URL instead of localhost
        const response = await fetch("https://resume-builder-ai-1.onrender.com/api/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password })
        });

        const result = await response.json();

        if(result.success){
            document.getElementById("result").innerText = "Account created successfully! Redirecting...";
            // Redirect to login page
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            document.getElementById("result").innerText = result.message || "Signup failed!";
        }

    } catch (err) {
        document.getElementById("result").innerText = "Error connecting to backend: " + err;
    }
}
</script>

</body>
</html>
