<!DOCTYPE html>
<html>
<head>
<title>Sign Up - CareerForge AI</title>

<style>
:root {
    --primary: #6366f1;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg-dark);
    color: var(--text-main);
}

nav {
    display:flex;
    justify-content:space-between;
    padding:1rem 5%;
    background: var(--bg-card);
}

.container {
    max-width:400px;
    margin:60px auto;
}

.card {
    background: var(--bg-card);
    padding:25px;
    border-radius:10px;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#0f172a;
    color:white;
    border:none;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background: var(--primary);
    border:none;
    color:white;
}

.result {
    margin-top:10px;
    padding:10px;
    background:black;
}
</style>
</head>

<body>

<nav>
<h2>CareerForge AI</h2>
<div>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
</div>
</nav>

<div class="container">

<div class="card">

<h2>Create Account 🎉</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">

<button onclick="signup()">Sign Up</button>

<div class="result" id="result"></div>

</div>

</div>

<script>
const BASE = "https://resume-builder-backend-muml.onrender.com";

async function signup(){
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if(!name || !email || !password || !confirm){
        document.getElementById("result").innerText = "Fill all fields!";
        return;
    }

    if(password !== confirm){
        document.getElementById("result").innerText = "Passwords do not match!";
        return;
    }

    try {
        const res = await fetch(BASE + "/api/signup", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if(data.success){
            document.getElementById("result").innerText = "Signup successful ✅";
            setTimeout(()=>{
                window.location.href = "login.html";
            },1000);
        } else {
            document.getElementById("result").innerText = data.message;
        }

    } catch (err) {
        document.getElementById("result").innerText = "❌ Backend error";
    }
}
</script>

</body>
</html>
